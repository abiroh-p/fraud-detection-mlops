services:

  # ── Kafka Broker (KRaft mode — no Zookeeper needed) ────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka
    hostname: kafka
    ports:
      # 9092 — for connections from your local machine / Codespace
      - "9092:9092"
      # 29092 — for connections between Docker containers
      - "29092:29092"
    environment:
      # KRaft settings — Kafka manages its own metadata
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Two listeners:
      # PLAINTEXT — for inter-container communication (other Docker services)
      # PLAINTEXT_HOST — for connections from outside Docker (your Python code)
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Performance and reliability settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"

      # Auto-create topics (convenient for dev, disabled in production)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Cluster ID — required for KRaft mode
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka UI — visual dashboard for inspecting topics ──────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fraud-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
    driver: local
